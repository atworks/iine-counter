<body>
  <header>
    <style type="text/css">
      html,
      body {
        touch-action: manipulation;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* スクロールを禁止 */
        overscroll-behavior-y: none; /* iOS/Androidのバウンドを防止 */
      }
      .container {
        display: flex;
        justify-content: center; /* 水平中央 */
        align-items: center; /* 垂直中央 */
        height: 100vh; /* 画面の高さ100% */
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 35px;
        background: #4676d7;
        box-shadow: 0 30px 0 #021872;
        color: #fff;
        padding: 8px 16px;
        font-size: 100px;
        width: 50%;
        height: 200px;
      }
      button:active {
        box-shadow: none;
        transform: translateY(30px);
      }
    </style>
  </header>
  <main>
    <div class="container">
      <button id="btn">いいね！</button>
    </div>
  </main>
  <footer></footer>
  <script>
    let ws;
    const connect = () => {
      ws = new WebSocket(
        "wss://lcmypwc323.execute-api.ap-northeast-1.amazonaws.com/production/",
      );
      ws.onopen = function () {};
      ws.onclose = (e) => {
        console.log("Socket closed. Reconnecting...", e.reason);
        setTimeout(() => {
          connect();
        }, 500);
      };
    };

    btn.addEventListener("click", (e) => {
      var data = {};
      data.action = "increment";
      ws.send(JSON.stringify(data));
    });

    connect();
  </script>
</body>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style type="text/css">
      .container {
        display: flex;
        justify-content: center; /* 水平中央 */
        align-items: center; /* 垂直中央 */
        height: 100vh; /* 画面の高さ100% */
      }
      input {
        width: auto;
        height: 10%;
        text-align: center;
        font-size: xxx-large;
        border: none;
      }
    </style>
  </head>
  <body>
    <p>いいね数ボード</p>
    <div class="container">
      <input id="dispMsg" />
    </div>
    <button id="reset">リセット</button>
  </body>
</html>

<script type="text/javascript">
  let ws;
  const connect = () => {
    ws = new WebSocket(
      "wss://lcmypwc323.execute-api.ap-northeast-1.amazonaws.com/production/",
    );

    ws.onopen = function (event) {
      var data = {};
      data.action = "sendmessage";
      ws.send(JSON.stringify(data));
    };

    //メッセージ受信
    ws.onmessage = function (event) {
      document.getElementById("dispMsg").value = event.data;
    };

    ws.onclose = (e) => {
      console.log("Socket closed. Reconnecting...", e.reason);
      setTimeout(() => {
        connect();
      }, 500);
    };
  };

  reset.addEventListener("click", (e) => {
    var data = {};
    data.action = "reset";
    ws.send(JSON.stringify(data));
  });

  connect();
</script>
